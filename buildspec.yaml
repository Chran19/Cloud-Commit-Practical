version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 18

    commands:
      - npm install

  build:
    commands:
      # run tests/linting
      - npm run lint
      # run build script
      - npm run build

artifacts:
  # include all files required to run the application
  base-directory: dist
  files:
    - "**/*"
